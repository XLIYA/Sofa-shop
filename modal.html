<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cart Modal</title>
    <script src="tailwind.js"></script>
</head>

<body class="bg-neutral-100 font-serif text-[#2f2f2f]">

    <button id="openCart"
        class="m-6 border border-gray-200 bg-white px-5 py-3 text-sm font-bold uppercase hover:bg-black hover:text-white">Show
        Cart</button>

    <div class="fixed inset-0 z-[1000] hidden bg-black/20" id="cartOverlay">
        <div class="absolute right-8 top-8 w-[360px] bg-white p-4 shadow" data-cart-preview>
            <div class="py-8 text-center text-gray-500">Loading cart...</div>
        </div>
    </div>

    <script src="modal.js" type="module"></script>
</body>

</html>
