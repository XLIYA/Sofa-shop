<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products | Sofa Shop</title>
  <script src="tailwind.js"></script>
</head>

<body class="bg-white font-serif text-[#2f2f2f]">
  <header class="mx-auto mt-2 w-full max-w-[1510px] border-y-2 border-dashed border-gray-400">
    <div class="flex min-h-[66px] items-center justify-between gap-8 px-1">
      <nav
        class="flex items-center gap-[38px] overflow-x-auto whitespace-nowrap text-[16px] font-bold uppercase leading-none"
        aria-label="Primary navigation">
        <a class="hover:text-[#ef4444]" href="index.html">Home</a>
        <a class="hover:text-[#ef4444]" href="#">Furniture</a>
        <a class="text-[#ef4444]" href="all-product.html">All Products</a>
        <a class="hover:text-[#ef4444]" href="#">Shop</a>
        <a class="hover:text-[#ef4444]" href="#">Mobile</a>
        <a class="hover:text-[#ef4444]" href="#">Offer</a>
        <a class="hover:text-[#ef4444]" href="#">Deal</a>
        <a class="hover:text-[#ef4444]" href="#">Blog</a>
        <a class="hover:text-[#ef4444]" href="#">Contact Us</a>
        <a class="hover:text-[#ef4444]" href="#">Custom Menu</a>
      </nav>

      <div class="flex shrink-0 items-center gap-[18px]">
        <button class="flex items-center text-[#2f2f2f] hover:text-[#ef4444]" type="button" aria-label="Search">
          <svg class="h-[23px] w-[23px]" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="m21 21-4.35-4.35m1.35-5.4a6.75 6.75 0 1 1-13.5 0 6.75 6.75 0 0 1 13.5 0Z" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <span class="h-[35px] w-px bg-gray-200"></span>
        <div class="group relative flex self-stretch items-center">
          <a class="flex items-center gap-2 text-[#2f2f2f] no-underline hover:text-[#ef4444]" href="shopping-cart.html"
            aria-label="Shopping cart">
            <svg class="h-[23px] w-[23px]" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="9" cy="20" r="1.5" stroke="currentColor" stroke-width="1.8" />
              <circle cx="18" cy="20" r="1.5" stroke="currentColor" stroke-width="1.8" />
              <path d="M3 4h2l2.5 11h10.7L21 7H7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
            <span><span class="text-[#ef4444]">3</span> ( items )</span>
          </a>
          <div data-cart-preview
            class="invisible absolute right-0 top-full z-50 w-[380px] max-w-[calc(100vw-16px)] translate-y-2 border border-gray-100 bg-white p-4 opacity-0 shadow-sm transition group-hover:visible group-hover:translate-y-0 group-hover:opacity-100 group-focus-within:visible group-focus-within:translate-y-0 group-focus-within:opacity-100"
            aria-label="Shopping cart preview">
            <div class="py-8 text-center text-gray-500">Loading cart...</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-[1510px] px-1 pb-12 pt-5">
    <div class="mb-7 flex items-center gap-2 text-[13px] text-gray-500">
      <a href="index.html" aria-label="Home">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9Z" stroke="currentColor" stroke-width="2"
            stroke-linejoin="round" />
        </svg>
      </a>
      <span>/</span>
      <span>All Products</span>
    </div>

    <div class="mb-8 flex flex-wrap items-end justify-between gap-5 border-b border-gray-200 pb-5">
      <div>
        <h1 class="text-[24px] font-bold uppercase leading-none text-[#1f2933]">All Products</h1>
        <p id="all-products-count" class="mt-3 text-[13px] text-gray-500">Loading products...</p>
      </div>
      <a class="flex h-11 items-center justify-center border border-gray-200 px-6 text-[13px] font-bold uppercase hover:bg-black hover:text-white"
        href="shopping-cart.html">View Cart</a>
    </div>

    <section id="all-products-root" aria-live="polite"></section>
  </main>

  <script src="pages/all-product-page.js" type="module"></script>
</body>

</html>
