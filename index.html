<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofa-shop</title>
    <script src="tailwind.js"></script>
</head>

<body>
    <section id="Advertising" class="min-h-[520px] bg-[#f3f3f3] flex items-center justify-center px-8 py-12">
        <div class="w-full max-w-[1200px] grid grid-cols-1 lg:grid-cols-2 items-center gap-16 lg:gap-24">

            <div class="flex justify-center lg:justify-end">
                <img src="assests/images/Axel-Stool.png" alt="Product stool"
                    class="w-[335px] md:w-[415px] lg:w-[480px] object-contain">
            </div>

            <div class="text-center lg:text-left max-w-[520px]">
                <h4 class="text-[18px] font-bold text-[#1f2937] uppercase mb-5 tracking-wide">
                    New Products
                </h4>

                <h1
                    class="text-[46px] md:text-[60px] lg:text-[68px] leading-none font-black text-[#2f2f2f] uppercase mb-6 font-serif">
                    Axel - Stool
                </h1>

                <p class="text-[16px] md:text-[18px] leading-8 text-[#4b5563] font-serif mb-10">
                    Lorem Ipsum has been the industry's standard dummy text ever since the 1500s,
                    when an unknown printer took a galley of type and scrambled it to make a type
                    specimen book. It has survived not only five centuries,
                </p>

                <button
                    class="bg-[#2f2f2f] text-white text-[18px] font-black px-10 py-4 uppercase font-serif hover:bg-black transition">
                    Buy Now
                </button>
            </div>

        </div>
    </section>
</body>

</html>
